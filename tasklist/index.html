<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="css/style.css">
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Document</title>
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">Lista de tareas avanzadas</h1>
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="input-group mb-3">
                    <input type="text" id="taskInput" class="form-control" placeholder="Nueva tarea">
                    <select class="form-select" id="categorySelect" style="max-width: 150px;">
                        <option value="">Categoría</option>
                        <option value="trabajo">Trabajo</option>
                        <option value="personal">Personal</option>
                        <option value="estudio">Estudio</option>
                    </select>
                    <input type="text" id="dueDateInput" class="form-control"  placeholder="Fecha de vencimiento" style="max-width: 200px;">
                
                    <button class="btn btn-primary" id="addTask">Agregar tarea</button>
                </div>
                <div class="input-group mb-3">
                    <input type="text" id="searchInput" class="form-control" placeholder="Buscar tareas">
                    <select name="" id="filterSelect" class="form-select" style="max-width: 150px;">
                        <option value="all">Todas</option>
                        <option value="active">En proceso</option>
                        <option value="completed">Completadas</option>
                    </select>
                </div>
            <ul id="taskList" class="list-group mb-3">
    <!-- Las tareas se agregarán aquí -->
</ul>


                <div id="stadistics" class="alert alert-info" role="alert"></div>
                
                <!-- Estadísticas de tareas se mostrarán aquí -->
            </div>

        </div>
    </div>

     <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="js/script.js"></script>

</body>
</html>
